audio:
  sampleRate: 48000
  frameSize: 20
  defaultBitrate: 96
  jitterBufferMs: 40
  device:
    # Laissez null pour auto-détection du device par défaut
    # Ou spécifiez le nom exact via l'interface /admin
    inputDeviceId: alsa_input.pci-0000_00_01.0.analog-stereo
    outputDeviceId: alsa_output.pci-0000_00_01.0.analog-stereo
    sampleRate: 48000
  routing:
    inputToGroup:
      "0":
        - production
      "1": []
      "2": []
      "4":
        - technique
      "5":
        - technique
    groupToOutput:
      technique:
        - "1"
      production:
        - "0"
        - "1"
    gains: {}
  channelNames:
    inputs:
      "0": iphone
      "1": Talkback FOH
      "2": Retour Console
      "3": Liaison Scène
      "4": Monitor Mix
      "5": Spare 1
    outputs:
      "0": Sortie Principale
      "1": Retour Scène
      "2": Talkback Console
groups:
  - name: Production
    audioBitrate: 96
    channels: []
  - name: Technique
    audioBitrate: 96
    channels: []
  - name: Sonorisation
    audioBitrate: 128
    channels: []
server:
  host: 0.0.0.0
  port: 3000
  livekit:
    url: AUTO  # AUTO = détection automatique IP réseau | ou ws://IP:7880 pour manuel
logging:
  level: debug  # Changez à 'debug' pour voir plus de détails
  logLatency: false
  logAudioStats: false
