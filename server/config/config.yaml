# PTT Live - Configuration
# Format simplifié : nom du groupe + canaux (les IDs sont générés automatiquement)

# Configuration audio globale
audio:
  sampleRate: 48000
  frameSize: 20  # ms
  defaultBitrate: 96  # kbps
  jitterBufferMs: 40

# Configuration des groupes
groups:
  - name: "Production"
    audioBitrate: 96
    channels:
      - name: "Principal"
        audioInput: 0
        audioOutput: 0
      - name: "Backup"
        audioInput: 1
        audioOutput: 1

  - name: "Technique"
    channels:
      - name: "Général"
        audioInput: 2
        audioOutput: 2

  - name: "Sonorisation"
    audioBitrate: 128
    channels:
      - name: "Principal"
        audioInput: 3
        audioOutput: 3
      - name: "Retours"
        audioInput: 4
        audioOutput: 4

# Configuration serveur
server:
  host: "0.0.0.0"
  port: 3000
  livekit:
    url: "ws://localhost:7880"

# Logging
logging:
  level: "debug"
  logLatency: true
  logAudioStats: true
