audio:
  sampleRate: 48000
  channels: 2
  frameSize: 20
  defaultBitrate: 128
  jitterBufferMs: 40
  device:
    inputDeviceId: Loopback Audio 4
    outputDeviceId: Haut-parleurs MacBook Pro
    sampleRate: 48000
  routing:
    inputToGroup:
      "0":
        - default
      "1": []
      "2": []
      "4":
        - technique
      "5":
        - technique
    groupToOutput:
      technique:
        - "1"
      production:
        - "0"
        - "1"
      default:
        - "0"
    gains: {}
  channelNames:
    inputs:
      "0": Mac
      "1": Talkback FOH
      "2": Retour Console
      "3": Liaison Scène
      "4": Monitor Mix
      "5": Spare 1
    outputs:
      "0": L
      "1": R
      "2": Talkback Console
# Utilisateurs audio gérés côté serveur.
# Chaque entrée crée un participant LiveKit indépendant avec un canal physique
# d'entrée (microphone/ligne) et un canal physique de sortie dédié (mix-minus naturel).
#
# Exemple (décommenter et adapter) :
# server_audio_users:
#   - name: foh
#     group: default          # ID du groupe LiveKit (room) à rejoindre
#     input_channel: 1        # Index canal physique d'entrée (depuis inputDeviceId)
#     output_channel: 2       # Index canal physique de sortie (vers outputDeviceId)
#   - name: returns
#     group: default
#     input_channel: 2
#     output_channel: 3
server_audio_users: []

groups:
  - name: Default
    audioBitrate: 96
    channels: []
  - name: Production
    audioBitrate: 96
    channels: []
  - name: Technique
    audioBitrate: 96
    channels: []
server:
  host: 0.0.0.0
  port: 3000
  livekit:
    url: AUTO
logging:
  level: debug
  logLatency: false
  logAudioStats: false
