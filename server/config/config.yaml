audio:
  sampleRate: 48000
  frameSize: 20
  defaultBitrate: 96
  jitterBufferMs: 40
  device:
    inputDeviceId: 0
    outputDeviceId: 2
    sampleRate: 48000
groups:
  - name: Production
    audioBitrate: 96
    channels:
      - name: Principal
        audioInput: 0
        audioOutput: 0
      - name: Backup
        audioInput: 1
        audioOutput: 1
  - name: Technique
    channels:
      - name: Général
        audioInput: 2
        audioOutput: 2
  - name: Sonorisation
    audioBitrate: 128
    channels:
      - name: Principal
        audioInput: 3
        audioOutput: 3
      - name: Retours
        audioInput: 4
        audioOutput: 4
server:
  host: 0.0.0.0
  port: 3000
  livekit:
    url: ws://localhost:7880
logging:
  level: debug
  logLatency: true
  logAudioStats: true
