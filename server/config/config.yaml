audio:
  sampleRate: 48000
  frameSize: 20
  defaultBitrate: 96
  jitterBufferMs: 40
  device:
    # inputDeviceId et outputDeviceId : laisser vide pour auto-détection du device par défaut
    # ou spécifier un ID numérique pour forcer un device spécifique
    inputDeviceId: null
    outputDeviceId: null
    sampleRate: 48000
  routing:
    inputToGroup:
      "0":
        - technique
      "1":
        - technique
      "2":
        - technique
      "4":
        - technique
      "5":
        - technique
    groupToOutput:
      technique:
        - "0"
    gains: {}
  channelNames:
    inputs:
      "0": Micro Régisseur
      "1": Talkback FOH
      "2": Retour Console
      "3": Liaison Scène
      "4": Monitor Mix
      "5": Spare 1
    outputs:
      "0": Sortie Principale
      "1": Retour Scène
      "2": Talkback Console
groups:
  - name: Production
    audioBitrate: 96
    channels: []
  - name: Technique
    channels: []
  - name: Sonorisation
    audioBitrate: 128
    channels: []
server:
  host: 0.0.0.0
  port: 3000
  livekit:
    url: ws://localhost:7880
logging:
  level: debug
  logLatency: true
  logAudioStats: true
